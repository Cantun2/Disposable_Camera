<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Native-app feel: lock the viewport, no user zoom, respect notches -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1020" />
    <meta name="description" content="A zero-friction disposable camera for your wedding — shoot vintage film photos and watch the gallery fill up live." />

    <!-- iOS standalone / home-screen behaviour -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wedding Cam" />

    <!-- Icons / favicons -->
    <link rel="icon" type="image/svg+xml" href="/camera.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Wedding Disposable</title>

    <!-- Boot splash: inline so it paints instantly, before any JS/CSS bundle
         loads. Hidden from src/main.tsx once React has mounted. -->
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background:
          radial-gradient(120% 90% at 50% -10%, #131c42 0%, #0b1020 55%, #070b18 100%);
        color: #f0d77f;
        font-family: Georgia, 'Times New Roman', serif;
        transition: opacity 0.5s ease;
      }
      #boot-splash.boot-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .boot-mark {
        width: 84px;
        height: 84px;
        animation: boot-float 2.6s ease-in-out infinite;
        filter: drop-shadow(0 8px 24px rgba(212, 175, 55, 0.35));
      }
      #boot-splash .boot-title {
        font-size: 1.9rem;
        letter-spacing: 0.04em;
        color: #f0d77f;
      }
      #boot-splash .boot-sub {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(240, 215, 127, 0.5);
      }
      #boot-splash .boot-bar {
        width: 92px;
        height: 2px;
        border-radius: 2px;
        overflow: hidden;
        background: rgba(240, 215, 127, 0.14);
      }
      #boot-splash .boot-bar::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #f7e7ad, #d4af37);
        animation: boot-slide 1.2s ease-in-out infinite;
      }
      @keyframes boot-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
      }
      @keyframes boot-slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(330%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .boot-mark,
        #boot-splash .boot-bar::after { animation: none; }
      }
    </style>
  </head>
  <body>
    <!-- Shown until React mounts (see src/main.tsx). -->
    <div id="boot-splash" role="status" aria-label="Loading">
      <svg class="boot-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect width="24" height="24" rx="5" fill="#0e1530" />
        <path d="M5 9h2l1-2h8l1 2h2v8H5V9Z" stroke="#d4af37" stroke-width="1.4" stroke-linejoin="round" />
        <circle cx="12" cy="13" r="3" stroke="#d4af37" stroke-width="1.4" />
      </svg>
      <div class="boot-title">Wedding Disposable</div>
      <div class="boot-bar"></div>
      <div class="boot-sub">Loading the moment</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
